const LANG_MULT={Deutsch:1.0,Englisch:0.85,Japanisch:1.3,Französisch:0.9,Spanisch:0.8};

function genPrice(base,lang){
return Math.max(0.1,parseFloat((base*(LANG_MULT[lang]||1)*(0.88+Math.random()*0.24)).toFixed(2)));
}
function genHistory(cur){
const h=[],now=Date.now();let p=cur*(1+(Math.random()*0.3-0.08));
for(let i=29;i>=0;i–){
p=Math.max(0.1,p+(Math.random()-0.48)*p*0.06);
h.push({d:new Date(now-i*86400000).toLocaleDateString(“de-DE”),p:parseFloat(p.toFixed(2))});
}
h[h.length-1].p=cur;return h;
}
function buildPrices(base){
const prices={},history={};
LANGUAGES.forEach(l=>{prices[l]=genPrice(base,l);history[l]=genHistory(prices[l]);});
return {prices,history};
}
function getBasePrice(card){
return card.cardmarket?.prices?.averageSellPrice
||card.tcgplayer?.prices?.holofoil?.market
||card.tcgplayer?.prices?.normal?.market
||card.basePrice||2;
}

function searchBuiltin(q){
if(!q.trim())return[];
const terms=q.toLowerCase().trim().split(/\s+/);
return BUILTIN.filter(c=>{
const hay=`${c.name} ${c.set} ${c.series} ${c.number} ${c.rarity} ${c.types.join(" ")}`.toLowerCase();
return terms.every(t=>hay.includes(t));
});
}

function Sparkline({h}){
if(!h||h.length<2)return null;
const ps=h.map(x=>x.p),mn=Math.min(…ps),mx=Math.max(…ps),rng=mx-mn||1;
const W=60,H=20;
const pts=ps.map((p,i)=>`${(i/(ps.length-1))*W},${H-((p-mn)/rng)*H}`).join(” “);
return React.createElement(“svg”,{width:W,height:H},
React.createElement(“polyline”,{points:pts,fill:“none”,stroke:ps[ps.length-1]>=ps[0]?”#34d399”:”#f87171”,strokeWidth:“1.5”,strokeLinejoin:“round”})
);
}
function Delta({h}){
if(!h||h.length<2)return null;
const pct=((h[h.length-1].p-h[0].p)/h[0].p)*100,up=pct>=0;
return React.createElement(“span”,{style:{fontSize:11,fontWeight:700,padding:“2px 7px”,borderRadius:20,background:up?“rgba(52,211,153,.15)”:“rgba(248,113,113,.15)”,color:up?”#34d399”:”#f87171”}},
(up?“▲”:“▼”)+” “+Math.abs(pct).toFixed(1)+”%”
);
}

const testAPI=async()=>{
try{
const r=await fetch(“https://api.pokemontcg.io/v2/cards?q=name:Pikachu&pageSize=1”);
if(r.ok){setApiOk(true);return true;}
}catch{}
setApiOk(false);return false;
};

const fetchFromAPI=async(searchQ,pg=1)=>{
const parts=searchQ.trim().split(/\s+/);
const lastNum=parseInt(parts[parts.length-1]);
let apiQ=`name:"${searchQ.trim()}"`;
if(!isNaN(lastNum)&&parts.length>1){
apiQ=`name:"${parts.slice(0,-1).join(" ")}" number:${lastNum}`;
}
const url=`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(apiQ)}&page=${pg}&pageSize=20&orderBy=-set.releaseDate`;
const res=await fetch(url);
if(!res.ok)throw new Error(“err”);
return res.json();
};

const doSearch=async()=>{
if(!q.trim())return;
setLoading(true);setResults([]);setPage(1);
let works=apiOk;
if(works===null)works=await testAPI();
if(works){
try{
const data=await fetchFromAPI(q,1);
setTotalCount(data.totalCount||0);
setResults(data.data||[]);
if(!data.data?.length){const bi=searchBuiltin(q);setResults(bi);setTotalCount(bi.length);}
}catch{
setApiOk(false);
const bi=searchBuiltin(q);setResults(bi);setTotalCount(bi.length);
}
}else{
const bi=searchBuiltin(q);setResults(bi);setTotalCount(bi.length);
if(!bi.length)toast(“Keine Karten gefunden.”);
}
setLoading(false);
};

const loadMore=async()=>{
if(!apiOk)return;
setLoading(true);
const next=page+1;setPage(next);
try{const data=await fetchFromAPI(q,next);setResults(prev=>[…prev,…(data.data||[])]);}catch{}
setLoading(false);
};
